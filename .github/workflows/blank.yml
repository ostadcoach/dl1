name: Download File to Repo

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'insert the direct download link here'
        required: true
        type: string

jobs:
  download-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Directory and Download File
        run: |
          mkdir -p Downloaded_Files
          cd Downloaded_Files
          curl -O -L "${{ github.event.inputs.download_url }}"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Downloaded_Files/
          git commit -m "Add downloaded file from ${{ github.event.inputs.download_url }}" || echo "No changes to commit"
          git push
